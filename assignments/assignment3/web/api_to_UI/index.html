<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Worker XHR Test</title>
    
</head>
<body>
   <div id="users"></div>

    <script>
        const usersContainer = document.getElementById('users');
        if (window.Worker) {
            const worker = new Worker('worker.js');

            worker.onmessage = function(event) {
                const response = event.data;

                if (response.success && response.data.length > 0) {
                    let htmlOutput = '';

                    response.data.forEach(user => {
                        const statusText = user.active ? 'Active' : 'Inactive';
                        htmlOutput += `<div> ${user.name} =  ${statusText} </div>`;
                    });

                    usersContainer.innerHTML = htmlOutput;
                }
                else {
                    usersContainer.innerHTML = 'No users found';
                }   
            };

            worker.onerror = function(error) {
                usersContainer.innerHTML = 'No users found';
            };

            worker.postMessage('FETCH_USERS');
        }
        else {
            usersContainer.innerHTML = 'Web Workers are not supported.';
        }
        

        
    
    </script>
</body>
</html>
